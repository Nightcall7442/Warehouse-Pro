<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Вы офлайн — Warehouse Pro</title>
  <style>
    body { font-family: -apple-system, sans-serif; background: #0f1117; color: #eaeaea;
           display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .card { text-align: center; padding: 40px 24px; max-width: 320px; }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 22px; margin: 0 0 8px; }
    p { color: #a3a3a3; font-size: 14px; margin: 0 0 24px; line-height: 1.5; }
    button { background: #4f46e5; color: white; border: none; padding: 12px 24px;
             border-radius: 8px; font-size: 14px; cursor: pointer; }
    button:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Вы офлайн</h1>
    <p>Нет подключения к интернету. Новые заказы сохраняются в разделе «Офлайн заказы».</p>
    <button onclick="location.reload()">Попробовать снова</button>
  </div>
</body>
</html>
